name: Build .NET e Rodar Docker Compose

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          MSSQL_SA_PASSWORD: "P@ssw0rd2024!"
          MSSQL_PID: Developer
          ACCEPT_EULA: "Y"
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P P@ssw0rd2024! -Q 'SELECT 1'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 1433:1433
    steps:
    - name: Checkout do código
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Configurar o SDK do .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.0.x'

    - name: Corrigir formatação automáticamente
      run: dotnet format EduOnline.slnx --no-restore

    - name: Validar formatação (informativo)
      continue-on-error: true
      run: dotnet format EduOnline.slnx --verify-no-changes --no-restore

    - name: Build da Solução
      run: dotnet build EduOnline.slnx --configuration Release

    - name: Executar Testes de Unidade
      run: >
        dotnet test EduOnline.slnx --configuration Release --no-build
        --filter "FullyQualifiedName!~IntegrationTest"
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=opencover
        /p:CoverletOutput="../../coverage/"
        /p:MergeWith="../../coverage/coverage.opencover.xml"

    - name: Executar Testes de Integração
      continue-on-error: true
      run: >
        dotnet test EduOnline.slnx
        --configuration Release
        --no-build
        --filter "FullyQualifiedName~IntegrationTest"
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=opencover
        /p:CoverletOutput="../../coverage/"
        /p:MergeWith="../../coverage/coverage.opencover.xml"
        --logger "trx;LogFileName=integration-tests.trx"

  build-push-images:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - imagem: andrecesco/eduonline-auth-api
            dockerfile: src/EduOnline.Auth.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-conteudos-api
            dockerfile: src/EduOnline.Conteudos.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-alunos-api
            dockerfile: src/EduOnline.Alunos.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-pagamentos-api
            dockerfile: src/EduOnline.Pagamentos.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-bff
            dockerfile: src/EduOnline.WebApps.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-status
            dockerfile: src/EduOnline.Api.Status/Dockerfile

    steps:
    - name: Checkout do código
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Configurar o Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Fazer Login no Docker Hub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build e Push da imagem ${{ matrix.imagem }}
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        push: true
        tags: |
          ${{ matrix.imagem }}:${{ github.sha }}
          ${{ matrix.imagem }}:latest

  docker-compose:
    needs: build-push-images
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Fazer Login no Docker Hub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Baixar as imagens publicadas no Docker Hub
      run: docker compose pull

    - name: Subir o Docker Compose completo
      run: docker compose up -d

    - name: Verificar status dos containers
      run: docker compose ps
