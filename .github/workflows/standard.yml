name: Build .NET e Rodar Docker Compose

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD || 'P@ssw0rd2024!' }}
          MSSQL_PID: Developer
          ACCEPT_EULA: "Y"
        ports:
          - 1433:1433
    steps:
    - name: Checkout do código
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Aguardar SQL Server estar pronto
      run: |
        for i in {1..30}; do
          if nc -z localhost 1433 2>/dev/null; then
            echo "SQL Server está pronto!"
            exit 0
          fi
          echo "Aguardando SQL Server... tentativa $i/30"
          sleep 2
        done
        echo "SQL Server não ficou pronto"
        exit 1
      shell: bash

    - name: Configurar o SDK do .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.0.x'

    - name: Corrigir formatação automáticamente
      run: dotnet format EduOnline.slnx --no-restore

    - name: Validar formatação (informativo)
      continue-on-error: true
      run: dotnet format EduOnline.slnx --verify-no-changes --no-restore

    - name: Build da Solução
      run: dotnet build EduOnline.slnx --configuration Release

    - name: Executar Testes de Unidade
      run: >
        dotnet test EduOnline.slnx --configuration Release --no-build
        --filter "FullyQualifiedName!~IntegrationTest"
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=opencover
        /p:CoverletOutput="../../coverage/"
        /p:MergeWith="../../coverage/coverage.opencover.xml"

    - name: Executar Testes de Integração
      continue-on-error: ${{ github.event_name == 'pull_request' }}
      run: >
        dotnet test EduOnline.slnx
        --configuration Release
        --no-build
        --filter "FullyQualifiedName~IntegrationTest"
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=opencover
        /p:CoverletOutput="../../coverage/"
        /p:MergeWith="../../coverage/coverage.opencover.xml"
        --logger "trx;LogFileName=integration-tests.trx"

    - name: Analisar com SonarCloud
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=andrecesco_eduonline
          -Dsonar.organization=andrecesco
          -Dsonar.sources=src
          -Dsonar.tests=test
          -Dsonar.exclusions=**/Migrations/**,**/obj/**,**/bin/**
          -Dsonar.test.inclusions=test/**/*Test.cs,test/**/*Tests.cs
          -Dsonar.coverage.exclusions=**/Migrations/**,**/obj/**,**/bin/**,test/**
          -Dsonar.dotnet.excludeGeneratedCode=true
          -Dsonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

  build-push-images:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - imagem: andrecesco/eduonline-auth-api
            dockerfile: src/EduOnline.Auth.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-conteudos-api
            dockerfile: src/EduOnline.Conteudos.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-alunos-api
            dockerfile: src/EduOnline.Alunos.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-pagamentos-api
            dockerfile: src/EduOnline.Pagamentos.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-bff
            dockerfile: src/EduOnline.WebApps.ApiRest/Dockerfile
          - imagem: andrecesco/eduonline-status
            dockerfile: src/EduOnline.Api.Status/Dockerfile

    steps:
    - name: Checkout do código
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Configurar o Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Fazer Login no Docker Hub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build e Push da imagem ${{ matrix.imagem }}
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        push: true
        tags: |
          ${{ matrix.imagem }}:${{ github.sha }}
          ${{ matrix.imagem }}:latest

  docker-compose:
    needs: build-push-images
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
    - name: Checkout do código
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Fazer Login no Docker Hub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Baixar as imagens publicadas no Docker Hub
      run: docker compose pull

    - name: Subir o Docker Compose completo
      run: docker compose up -d

    - name: Verificar status dos containers
      run: docker compose ps
