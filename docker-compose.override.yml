version: '3.9'

# ============================================================================
# Docker Compose Override - Development Configuration
# Este arquivo é carregado automaticamente após docker-compose.yml
# Use para configurações específicas de desenvolvimento local
# ============================================================================

services:
  sqlserver:
    environment:
      MSSQL_TCP_PORT: "1433"
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
      - sqlserver_log:/var/opt/mssql/log

  auth-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_DETAILEDERRORS: "true"
      LOG_LEVEL: "Debug"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
    build:
      context: .
      dockerfile: src/EduOnline.Auth.ApiRest/Dockerfile
      cache_from:
        - eduonline/auth-api:dev
    volumes:
      - ./src/EduOnline.Auth.ApiRest:/app/src/EduOnline.Auth.ApiRest
    ports:
      - "5000:5000"

  conteudos-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5001"
      ASPNETCORE_DETAILEDERRORS: "true"
      LOG_LEVEL: "Debug"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
    build:
      context: .
      dockerfile: src/EduOnline.Conteudos.ApiRest/Dockerfile
      cache_from:
        - eduonline/conteudos-api:dev
    ports:
      - "5001:5001"

  alunos-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5002"
      ASPNETCORE_DETAILEDERRORS: "true"
      LOG_LEVEL: "Debug"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
    build:
      context: .
      dockerfile: src/EduOnline.Alunos.ApiRest/Dockerfile
      cache_from:
        - eduonline/alunos-api:dev
    ports:
      - "5002:5002"

  pagamentos-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5003"
      ASPNETCORE_DETAILEDERRORS: "true"
      LOG_LEVEL: "Debug"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
    build:
      context: .
      dockerfile: src/EduOnline.Pagamentos.ApiRest/Dockerfile
      cache_from:
        - eduonline/pagamentos-api:dev
    ports:
      - "5003:5003"

  bff-api:
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5004"
      ASPNETCORE_DETAILEDERRORS: "true"
      LOG_LEVEL: "Debug"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
    build:
      context: .
      dockerfile: src/EduOnline.WebApps.ApiRest/Dockerfile
      cache_from:
        - eduonline/bff-api:dev
    ports:
      - "5004:5004"
