version: '3.8'

services:
  # SQLite shared database files
  sqlite:
    image: alpine:latest
    container_name: eduonline_sqlite
    command: sh -c "mkdir -p /data && while true; do sleep 10; done"
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "test -d /data"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduonline_network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: eduonline_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduonline_network

