version: '3.9'

services:
  # ============================================================================
  # SQL SERVER - Database
  # ============================================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eduonline-sqlserver
    hostname: sqlserver
    user: root
    ports:
      - "1433:1433"
    environment:
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-P@ssw0rd2024!}"
      MSSQL_PID: Developer
      ACCEPT_EULA: "Y"
      MSSQL_COLLATION: "Latin1_General_CI_AS"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
      - sqlserver_log:/var/opt/mssql/log
      - sqlserver_backup:/var/opt/mssql/backup
      - ./infra/database/InitDB.sql:/docker-entrypoint-initdb.d/InitDB.sql:ro
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD:-P@ssw0rd2024!}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eduonline-network
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 2G

  # ============================================================================
  # EVENTSTORE - Event Sourcing / KurrentDB compatível
  # ============================================================================
  eventstore:
    image: eventstore/eventstore:24.10.0
    container_name: eduonline-eventstore
    hostname: eventstore
    ports:
      - "2113:2113"
    environment:
      EVENTSTORE_INSECURE: "true"
      EVENTSTORE_RUN_PROJECTIONS: "All"
      EVENTSTORE_START_STANDARD_PROJECTIONS: "true"
      EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: "true"
    volumes:
      - eventstore_data:/var/lib/eventstore
    networks:
      - eduonline-network
    restart: on-failure

  # ============================================================================
  # OBSERVABILITY - OpenTelemetry Collector + Jaeger + Prometheus (local-compose)
  # ============================================================================
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: eduonline-otel-collector
    hostname: otel-collector
    ports:
      - "4317:4317"
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]
    networks:
      - eduonline-network
    restart: on-failure

  jaeger:
    image: jaegertracing/all-in-one:1.41
    container_name: eduonline-jaeger
    hostname: jaeger
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - eduonline-network
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: eduonline-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - eduonline-network
    restart: on-failure

  # ============================================================================
  # AUTH API - Autenticação e Autorização
  # ============================================================================
  auth-api:
    build:
      context: .
      dockerfile: src/EduOnline.Auth.ApiRest/Dockerfile
    image: eduonline/auth-api:latest
    container_name: eduonline-auth-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_HTTP_PORTS: "5000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EduOnlineDB;User Id=sa;Password=${SA_PASSWORD:-P@ssw0rd2024!};TrustServerCertificate=true;Encrypt=false;"
      ConnectionStrings__EventStoreConnection: "esdb://eventstore:2113?tls=false"
      JWT__Secret: "${JWT_SECRET:-SuperSecretKeyForJWT_Change_This_In_Production_2024}"
      JWT__Issuer: "EduOnline.Auth"
      JWT__Audience: "EduOnline.Client"
      JWT__ExpirationMinutes: "60"
    depends_on:
      sqlserver:
        condition: service_healthy
      eventstore:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - eduonline-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # CONTEUDOS API - Cursos e Aulas
  # ============================================================================
  conteudos-api:
    build:
      context: .
      dockerfile: src/EduOnline.Conteudos.ApiRest/Dockerfile
    image: eduonline/conteudos-api:latest
    container_name: eduonline-conteudos-api
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5001"
      ASPNETCORE_HTTP_PORTS: "5001"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EduOnlineDB;User Id=sa;Password=${SA_PASSWORD:-P@ssw0rd2024!};TrustServerCertificate=true;Encrypt=false;"
      ConnectionStrings__EventStoreConnection: "esdb://eventstore:2113?tls=false"
      ServiceUrls__AuthApi: "http://auth-api:5000"
      JWT__Secret: "${JWT_SECRET:-SuperSecretKeyForJWT_Change_This_In_Production_2024}"
    depends_on:
      sqlserver:
        condition: service_healthy
      eventstore:
        condition: service_started
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - eduonline-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # ALUNOS API - Gestão de Alunos e Matrículas
  # ============================================================================
  alunos-api:
    build:
      context: .
      dockerfile: src/EduOnline.Alunos.ApiRest/Dockerfile
    image: eduonline/alunos-api:latest
    container_name: eduonline-alunos-api
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5002"
      ASPNETCORE_HTTP_PORTS: "5002"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EduOnlineDB;User Id=sa;Password=${SA_PASSWORD:-P@ssw0rd2024!};TrustServerCertificate=true;Encrypt=false;"
      ConnectionStrings__EventStoreConnection: "esdb://eventstore:2113?tls=false"
      ServiceUrls__AuthApi: "http://auth-api:5000"
      ServiceUrls__ConteudosApi: "http://conteudos-api:5001"
      JWT__Secret: "${JWT_SECRET:-SuperSecretKeyForJWT_Change_This_In_Production_2024}"
    depends_on:
      sqlserver:
        condition: service_healthy
      eventstore:
        condition: service_started
      auth-api:
        condition: service_healthy
      conteudos-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - eduonline-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # PAGAMENTOS API - Processamento de Pagamentos
  # ============================================================================
  pagamentos-api:
    build:
      context: .
      dockerfile: src/EduOnline.Pagamentos.ApiRest/Dockerfile
    image: eduonline/pagamentos-api:latest
    container_name: eduonline-pagamentos-api
    ports:
      - "5003:5003"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5003"
      ASPNETCORE_HTTP_PORTS: "5003"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      SeedSettings__EnableMigrations: "false"
      SeedSettings__EnableSeedData: "false"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EduOnlineDB;User Id=sa;Password=${SA_PASSWORD:-P@ssw0rd2024!};TrustServerCertificate=true;Encrypt=false;"
      ConnectionStrings__EventStoreConnection: "esdb://eventstore:2113?tls=false"
      ServiceUrls__AuthApi: "http://auth-api:5000"
      ServiceUrls__AlunosApi: "http://alunos-api:5002"
      JWT__Secret: "${JWT_SECRET:-SuperSecretKeyForJWT_Change_This_In_Production_2024}"
    depends_on:
      sqlserver:
        condition: service_healthy
      eventstore:
        condition: service_started
      auth-api:
        condition: service_healthy
      alunos-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - eduonline-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # BFF API - Backend for Frontend
  # ============================================================================
  bff-api:
    build:
      context: .
      dockerfile: src/EduOnline.WebApps.ApiRest/Dockerfile
    image: eduonline/bff-api:latest
    container_name: eduonline-bff-api
    ports:
      - "5004:5004"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5004"
      ASPNETCORE_HTTP_PORTS: "5004"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EduOnlineDB;User Id=sa;Password=${SA_PASSWORD:-P@ssw0rd2024!};TrustServerCertificate=true;Encrypt=false;"
      ConnectionStrings__EventStoreConnection: "esdb://eventstore:2113?tls=false"
      ServiceUrls__AuthApi: "http://auth-api:5000"
      ServiceUrls__ConteudosApi: "http://conteudos-api:5001"
      ServiceUrls__AlunosApi: "http://alunos-api:5002"
      ServiceUrls__PagamentosApi: "http://pagamentos-api:5003"
      JWT__Secret: "${JWT_SECRET:-SuperSecretKeyForJWT_Change_This_In_Production_2024}"
      ASPNETCORE_AllowedHosts: "*"
    depends_on:
      sqlserver:
        condition: service_healthy
      eventstore:
        condition: service_started
      auth-api:
        condition: service_healthy
      conteudos-api:
        condition: service_healthy
      alunos-api:
        condition: service_healthy
      pagamentos-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - eduonline-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# VOLUMES - Persistência de Dados
# ============================================================================
volumes:
  sqlserver_data:
    driver: local
  sqlserver_log:
    driver: local
  sqlserver_backup:
    driver: local
  eventstore_data:
    driver: local

# ============================================================================
# NETWORKS - Comunicação entre Serviços
# ============================================================================
networks:
  eduonline-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
