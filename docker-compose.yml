  # Auth Microservice
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile.Auth
    container_name: eduonline_auth_api
    depends_on:
      sqlite:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Data Source=/data/eduonline-auth.db"
    volumes:
      - sqlite_data:/data
    ports:
      - "8002:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - eduonline_network

