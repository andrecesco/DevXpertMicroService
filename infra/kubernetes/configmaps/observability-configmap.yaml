apiVersion: v1
kind: ConfigMap
metadata:
  name: eduonline-observability
  namespace: eduonline
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "eduonline-platform"
