apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagamentos-api
  namespace: eduonline
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pagamentos-api
  template:
    metadata:
      labels:
        app: pagamentos-api
        app.kubernetes.io/name: pagamentos-api
        app.kubernetes.io/part-of: eduonline-platform
    spec:
      serviceAccountName: eduonline-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 64198
        runAsGroup: 64198
        fsGroup: 64198
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pagamentos-api
          image: eduonline/pagamentos-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5003
              name: http
          envFrom:
            - configMapRef:
                name: eduonline-config
            - configMapRef:
                name: eduonline-observability
            - secretRef:
                name: eduonline-secrets
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:5003
            - name: ASPNETCORE_HTTP_PORTS
              value: "5003"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4317"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: eduonline-secrets
                  key: pagamentos-connection-string
            - name: ConnectionStrings__DefaultConnectionLite
              value: Data Source=/tmp/EduOnlinePagamentos.db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 180
            periodSeconds: 20
