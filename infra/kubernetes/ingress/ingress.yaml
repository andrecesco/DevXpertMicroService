apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eduonline-ingress
  namespace: eduonline
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /status
            pathType: Prefix
            backend:
              service:
                name: status-api
                port:
                  number: 5005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bff-api
                port:
                  number: 5004
