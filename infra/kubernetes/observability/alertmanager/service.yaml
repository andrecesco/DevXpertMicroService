apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: eduonline
  labels:
    app: alertmanager
    component: observability
spec:
  type: ClusterIP
  ports:
  - name: web
    port: 9093
    targetPort: web
    protocol: TCP
  - name: cluster
    port: 9094
    targetPort: cluster
    protocol: TCP
  selector:
    app: alertmanager
