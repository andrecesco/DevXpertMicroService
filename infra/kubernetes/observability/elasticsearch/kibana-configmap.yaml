apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-config
  namespace: eduonline
  labels:
    app: kibana
    component: observability
data:
  kibana.yml: |
    server:
      name: kibana
      host: 0.0.0.0
      port: 5601
      baseUrl: /
    elasticsearch:
      hosts: ["http://elasticsearch:9200"]
      username: elastic
      password: ElasticsearchPassword2026!
    logging:
      level: info
    xpack.security.enabled: false
    xpack.reporting.enabled: false
    xpack.ml.enabled: false
    timelion.enabled: false
