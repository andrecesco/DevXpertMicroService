apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-credentials
  namespace: eduonline
  labels:
    app: elasticsearch
    component: observability
type: Opaque
stringData:
  password: "ElasticsearchPassword2026!"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elasticsearch
  namespace: eduonline
  labels:
    app: elasticsearch
    component: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elasticsearch
  labels:
    app: elasticsearch
    component: observability
rules:
- apiGroups: [""]
  resources:
  - endpoints
  - services
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elasticsearch
  labels:
    app: elasticsearch
    component: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elasticsearch
subjects:
- kind: ServiceAccount
  name: elasticsearch
  namespace: eduonline
