apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: eduonline
  labels:
    app: jaeger
    component: observability
spec:
  type: ClusterIP
  ports:
  - name: jaeger-agent-zipkin-thrift
    port: 6831
    targetPort: jaeger-agent-zipkin-thrift
    protocol: UDP
  - name: jaeger-agent-compact
    port: 6832
    targetPort: jaeger-agent-compact
    protocol: UDP
  - name: jaeger-agent-binary
    port: 6833
    targetPort: jaeger-agent-binary
    protocol: UDP
  - name: jaeger-query
    port: 16686
    targetPort: jaeger-query
    protocol: TCP
  - name: jaeger-admin
    port: 14269
    targetPort: jaeger-admin
    protocol: TCP
  - name: zipkin
    port: 9411
    targetPort: 9411
    protocol: TCP
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-agent
  namespace: eduonline
  labels:
    app: jaeger
    component: observability
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: jaeger-agent-zipkin-thrift
    port: 6831
    targetPort: jaeger-agent-zipkin-thrift
    protocol: UDP
  - name: jaeger-agent-compact
    port: 6832
    targetPort: jaeger-agent-compact
    protocol: UDP
  - name: jaeger-agent-binary
    port: 6833
    targetPort: jaeger-agent-binary
    protocol: UDP
  selector:
    app: jaeger
