apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-api
  namespace: eduonline
  labels:
    app: auth-api
    component: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth-api
  namespace: eduonline
  labels:
    app: auth-api
    component: security
rules:
- apiGroups: [""]
  resources:
  - configmaps
  - secrets
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
  - services
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-api
  namespace: eduonline
  labels:
    app: auth-api
    component: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: auth-api
subjects:
- kind: ServiceAccount
  name: auth-api
  namespace: eduonline
