apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer
  namespace: eduonline
  labels:
    role: developer
    component: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: eduonline
  labels:
    role: developer
    component: security
rules:
- apiGroups: [""]
  resources:
  - pods
  - pods/logs
  - pods/portforward
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
  - deployments
  - statefulsets
  - daemonsets
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
  - services
  - configmaps
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
  - jobs
  - cronjobs
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer
  namespace: eduonline
  labels:
    role: developer
    component: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: developer
subjects:
- kind: ServiceAccount
  name: developer
  namespace: eduonline
