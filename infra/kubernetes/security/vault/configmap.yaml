apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: eduonline
  labels:
    app: vault
    component: security
data:
  vault.hcl: |
    storage "file" {
      path = "/vault/data"
    }

    listener "tcp" {
      address       = "0.0.0.0:8200"
      tls_disable   = 1
    }

    listener "unix" {
      address = "/tmp/vault.sock"
    }

    ui = true

    log_level = "info"
