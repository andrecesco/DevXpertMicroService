apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: eduonline
  labels:
    app: alertmanager
    component: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: '${SLACK_WEBHOOK_URL}'
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

    route:
      receiver: 'default'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h

      routes:
      # Critical alerts
      - match:
          severity: critical
        receiver: critical
        group_wait: 0s
        group_interval: 1m
        repeat_interval: 1h

      # Warning alerts
      - match:
          severity: warning
        receiver: warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      # Info alerts
      - match:
          severity: info
        receiver: info
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 1d

    receivers:
    - name: 'default'
      slack_configs:
      - channel: '#alerts'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

    - name: 'critical'
      slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        actions:
        - type: button
          text: 'Grafana'
          url: 'https://grafana.eduonline.local'
      pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        description: 'CRITICAL: {{ .GroupLabels.alertname }}'

    - name: 'warning'
      slack_configs:
      - channel: '#warnings'
        title: '⚠️  WARNING: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

    - name: 'info'
      slack_configs:
      - channel: '#info'
        title: 'ℹ️  INFO: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: false

    inhibit_rules:
    # Don't send warning if critical is firing
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'cluster', 'service']

    # Don't send info if warning is firing
    - source_match:
        severity: 'warning'
      target_match:
        severity: 'info'
      equal: ['alertname', 'cluster', 'service']
