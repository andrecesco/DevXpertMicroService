apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-content
  namespace: eduonline
  labels:
    app: grafana
    component: observability
data:
  api-metrics-dashboard.json: |
    {
      "dashboard": {
        "title": "API Metrics Dashboard",
        "tags": ["api", "microservices"],
        "timezone": "browser",
        "uid": "api-metrics",
        "version": 1,
        "panels": [
          {
            "id": 1,
            "title": "API Request Rate (req/s)",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total{job=~\".*-api\"}[5m])) by (job)",
                "legendFormat": "{{ job }}"
              }
            ],
            "type": "timeseries",
            "fieldConfig": {
              "defaults": {
                "custom": {},
                "unit": "reqps"
              }
            }
          },
          {
            "id": 2,
            "title": "Request Duration - P95 (ms)",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\".*-api\"}[5m])) by (job, le)) * 1000",
                "legendFormat": "{{ job }}"
              }
            ],
            "type": "timeseries"
          },
          {
            "id": 3,
            "title": "Error Rate (%)",
            "targets": [
              {
                "expr": "(sum(rate(http_requests_total{job=~\".*-api\",status=~\"5..\"}[5m])) by (job) / sum(rate(http_requests_total{job=~\".*-api\"}[5m])) by (job)) * 100",
                "legendFormat": "{{ job }}"
              }
            ],
            "type": "timeseries"
          },
          {
            "id": 4,
            "title": "Active Requests",
            "targets": [
              {
                "expr": "sum(http_requests_in_flight{job=~\".*-api\"}) by (job)",
                "legendFormat": "{{ job }}"
              }
            ],
            "type": "timeseries"
          }
        ]
      }
    }
  database-dashboard.json: |
    {
      "dashboard": {
        "title": "Database Dashboard",
        "tags": ["database", "sqlserver"],
        "timezone": "browser",
        "uid": "database",
        "version": 1,
        "panels": [
          {
            "id": 1,
            "title": "Active Connections",
            "targets": [
              {
                "expr": "mssql_connections_active",
                "legendFormat": "{{ instance }}"
              }
            ],
            "type": "gauge",
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "mode": "percentage",
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 70},
                    {"color": "red", "value": 90}
                  ]
                }
              }
            }
          },
          {
            "id": 2,
            "title": "Query Execution Time",
            "targets": [
              {
                "expr": "avg(mssql_query_execution_time_ms)"
              }
            ],
            "type": "timeseries"
          },
          {
            "id": 3,
            "title": "Database Size",
            "targets": [
              {
                "expr": "mssql_database_size_bytes / 1024 / 1024 / 1024",
                "legendFormat": "{{ database }}"
              }
            ],
            "type": "stat",
            "fieldConfig": {
              "defaults": {
                "unit": "GB"
              }
            }
          },
          {
            "id": 4,
            "title": "Transactions Per Minute",
            "targets": [
              {
                "expr": "rate(mssql_transactions_total[1m]) * 60"
              }
            ],
            "type": "timeseries"
          }
        ]
      }
    }
  kubernetes-dashboard.json: |
    {
      "dashboard": {
        "title": "Kubernetes Dashboard",
        "tags": ["kubernetes", "cluster"],
        "timezone": "browser",
        "uid": "kubernetes",
        "version": 1,
        "panels": [
          {
            "id": 1,
            "title": "Node Status",
            "targets": [
              {
                "expr": "sum by (condition) (kube_node_status_condition{condition=\"Ready\"})"
              }
            ],
            "type": "stat"
          },
          {
            "id": 2,
            "title": "Pod Restarts (24h)",
            "targets": [
              {
                "expr": "sum(rate(kube_pod_container_status_restarts_total[1d])) by (pod, namespace)"
              }
            ],
            "type": "timeseries"
          },
          {
            "id": 3,
            "title": "CPU Usage",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\".*-api\"}[5m])) by (pod) * 100"
              }
            ],
            "type": "timeseries",
            "fieldConfig": {
              "defaults": {
                "unit": "percent"
              }
            }
          },
          {
            "id": 4,
            "title": "Memory Usage",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{pod=~\".*-api\"}) by (pod) / 1024 / 1024"
              }
            ],
            "type": "timeseries",
            "fieldConfig": {
              "defaults": {
                "unit": "MB"
              }
            }
          },
          {
            "id": 5,
            "title": "Volume Usage %",
            "targets": [
              {
                "expr": "(kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100"
              }
            ],
            "type": "gauge"
          }
        ]
      }
    }
  business-metrics-dashboard.json: |
    {
      "dashboard": {
        "title": "Business Metrics Dashboard",
        "tags": ["business", "analytics"],
        "timezone": "browser",
        "uid": "business",
        "version": 1,
        "panels": [
          {
            "id": 1,
            "title": "Total Users",
            "targets": [
              {
                "expr": "alunos_total_users"
              }
            ],
            "type": "stat"
          },
          {
            "id": 2,
            "title": "Active Users (24h)",
            "targets": [
              {
                "expr": "alunos_active_users_24h"
              }
            ],
            "type": "stat"
          },
          {
            "id": 3,
            "title": "Course Enrollments",
            "targets": [
              {
                "expr": "sum(conteudos_course_enrollments)"
              }
            ],
            "type": "stat"
          },
          {
            "id": 4,
            "title": "Total Revenue (BRL)",
            "targets": [
              {
                "expr": "sum(pagamentos_total_revenue_brl)"
              }
            ],
            "type": "stat",
            "fieldConfig": {
              "defaults": {
                "unit": "currencyBRL"
              }
            }
          },
          {
            "id": 5,
            "title": "Payment Success Rate",
            "targets": [
              {
                "expr": "(sum(pagamentos_successful_transactions) / sum(pagamentos_total_transactions)) * 100"
              }
            ],
            "type": "gauge"
          },
          {
            "id": 6,
            "title": "Revenue Trend (7d)",
            "targets": [
              {
                "expr": "increase(pagamentos_total_revenue_brl[1d])"
              }
            ],
            "type": "timeseries"
          }
        ]
      }
    }
