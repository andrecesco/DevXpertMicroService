apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: eduonline
  labels:
    app: grafana
    component: observability
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: eduonline
  labels:
    app: grafana
    component: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'Dashboards'
      orgId: 1
      folder: 'EduOnline'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
