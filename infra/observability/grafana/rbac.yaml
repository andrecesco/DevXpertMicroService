apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: eduonline
  labels:
    app: grafana
    component: observability
type: Opaque
stringData:
  password: "GrafanaAdminPassword2026!"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: eduonline
  labels:
    app: grafana
    component: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana
  labels:
    app: grafana
    component: observability
rules:
- apiGroups: [""]
  resources:
  - configmaps
  - secrets
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana
  labels:
    app: grafana
    component: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana
subjects:
- kind: ServiceAccount
  name: grafana
  namespace: eduonline
