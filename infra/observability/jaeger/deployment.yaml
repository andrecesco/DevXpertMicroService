apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: eduonline
  labels:
    app: jaeger
    component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
        component: observability
    spec:
      serviceAccountName: jaeger
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.50
        imagePullPolicy: IfNotPresent
        ports:
        - name: jaeger-agent-zipkin-thrift
          containerPort: 6831
          protocol: UDP
        - name: jaeger-agent-compact
          containerPort: 6832
          protocol: UDP
        - name: jaeger-agent-binary
          containerPort: 6833
          protocol: UDP
        - name: jaeger-query
          containerPort: 16686
          protocol: TCP
        - name: jaeger-admin
          containerPort: 14269
          protocol: TCP
        env:
        - name: COLLECTOR_ZIPKIN_HTTP_PORT
          value: "9411"
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        - name: SAMPLER_TYPE
          value: probabilistic
        - name: SAMPLER_PARAM
          value: "0.1"
        - name: MEMORY_MAX_TRACES
          value: "10000"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: jaeger-query
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: jaeger-query
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: jaeger-config
          mountPath: /etc/jaeger
      volumes:
      - name: jaeger-config
        configMap:
          name: jaeger-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - jaeger
              topologyKey: kubernetes.io/hostname
