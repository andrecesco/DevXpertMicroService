apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: eduonline
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'eduonline-dev'
        environment: 'kubernetes'

    # Alertmanager configuration
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093

    # Rule files
    rule_files:
      - '/etc/prometheus/rules/*.yml'

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Kubernetes pods (kubelet)
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # Auth API
      - job_name: 'auth-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - eduonline
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: 'auth-api'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_number]
            regex: '5000'
            action: keep

      # Conteudos API
      - job_name: 'conteudos-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - eduonline
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: 'conteudos-api'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_number]
            regex: '5001'
            action: keep

      # Alunos API
      - job_name: 'alunos-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - eduonline
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: 'alunos-api'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_number]
            regex: '5002'
            action: keep

      # Pagamentos API
      - job_name: 'pagamentos-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - eduonline
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: 'pagamentos-api'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_number]
            regex: '5003'
            action: keep

      # BFF API
      - job_name: 'bff-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - eduonline
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: 'bff-api'
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_number]
            regex: '5004'
            action: keep

      # SQL Server metrics (if exposing via sidecar)
      - job_name: 'sqlserver'
        static_configs:
          - targets: ['sqlserver:1433']
            labels:
              instance: 'eduonline-db'
