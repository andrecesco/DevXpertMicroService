apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: eduonline
  labels:
    role: admin
    component: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin
  namespace: eduonline
  labels:
    role: admin
    component: security
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin
  namespace: eduonline
  labels:
    role: admin
    component: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: admin
subjects:
- kind: ServiceAccount
  name: admin
  namespace: eduonline
