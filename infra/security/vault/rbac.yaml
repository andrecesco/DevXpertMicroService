apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: eduonline
  labels:
    app: vault
    component: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault
  labels:
    app: vault
    component: security
rules:
- apiGroups: [""]
  resources:
  - pods
  - services
  verbs: ["get", "list"]
- apiGroups: [""]
  resources:
  - serviceaccounts
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
  - secrets
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources:
  - statefulsets
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault
  labels:
    app: vault
    component: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault
subjects:
- kind: ServiceAccount
  name: vault
  namespace: eduonline
