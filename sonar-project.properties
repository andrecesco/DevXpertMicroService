# SonarQube Configuration for EduOnline Platform
# Place this file in the repository root as sonar-project.properties

sonar.projectKey=eduonline-platform
sonar.projectName=EduOnline Platform
sonar.projectVersion=1.0.0

# ============================================================================
# Source Code
# ============================================================================
sonar.sources=src
sonar.tests=test
sonar.sourceEncoding=UTF-8

# ============================================================================
# .NET Specific Settings
# ============================================================================
sonar.dotnet.excludeGeneratedCode=true
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.roslyn.reportFilePath=**/*RoslynReport.json

# ============================================================================
# Code Coverage
# ============================================================================
sonar.coverage.exclusions=**/*Tests*,**/*IntegrationTest*,**/bin/**,**/obj/**

# ============================================================================
# Exclusions
# ============================================================================
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,.git/**

# ============================================================================
# Issue Resolution
# ============================================================================
sonar.issueResolutionFromActionPlanStatus=false

# ============================================================================
# C# Code Quality Rules
# ============================================================================
# Enable security hotspots
sonar.security.hotspots.enabled=true

# Enable all C# rules
sonar.cs.enableImportCostAnalysis=true

# ============================================================================
# Authentication (via SONAR_TOKEN)
# ============================================================================
# Set via GitHub Actions: -Dsonar.login=$SONAR_TOKEN
